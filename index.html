<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#004B8D;
padding:18px;
}

.logo{
height:40px;
display:block;
}

.container{
max-width:800px;
margin:auto;
padding:50px 20px;
flex:1;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
max-width:500px;
margin:auto;
}

.certificate{
width:100%;
display:block;
border-radius:12px;
}

footer{
background:#005A9C;
color:#fff;
padding:40px 20px 25px;
margin-top:auto;
}

.footer-top{
max-width:1000px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
text-align:center;
}

.item{
flex:1;
padding:8px;
text-align:center;
text-decoration:none;
color:#fff;
display:block;
min-width:0;
}

.item:hover{
color:#fff;
}

.footer-top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:nowrap;
text-align:center;
}

.divider{
width:1px;
height:90px;
background:rgba(255,255,255,.3);
}

@media(max-width:768px){

.footer-top{
flex-direction:row;
}

.divider{
width:1px;
height:80px;
}

.icon{
width:45px;
height:45px;
font-size:20px;
}

.item h3{
font-size:12px;
}

.item p{
font-size:11px;
}

.copy{
font-size:12px;
}

}

.divider{
width:80%;
height:1px;
margin:15px 0;
}

.item{
padding:15px 0;
}

.item h3{
font-size:20px;
}

.item p{
font-size:16px;
}

.icon{
width:60px;
height:60px;
font-size:28px;
}

.copy{
font-size:14px;
}

}

</style>

</head>

<body>

<header>

<img src="0003.png.png" class="logo">

</header>

<div class="container">

<div class="card">

<img src="1633265936658.jpg" class="certificate">

</div>

</div>

<footer>

<div class="footer-top">

<a class="item" href="tel:920024555">
<div class="icon">📞</div>
<h3>920024555</h3>
<p>Call Us</p>
</a>

<div class="divider"></div>

<a class="item" href="mailto:info@es.chamber.org.sa">
<div class="icon">✉️</div>
<h3>info@es.chamber.org.sa</h3>
<p>Email Us</p>
</a>

<div class="divider"></div>

<a class="item" href="https://es.chamber.org.sa" target="_blank">
<div class="icon">🌐</div>
<h3>es.chamber.org.sa</h3>
<p>Visit Website</p>
</a>

</div>

<hr>

<div class="copy">
© Copyright Asharqia Chamber
<br><br>
<a href="#">العربية</a> |
<a href="#">English (US)</a>
</div>

</footer>

</body>
</html>
