<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Gallery</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
text-align:center;
}

header{
background:#0056b3;
color:#fff;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
margin:20px auto;
padding:15px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,.2);
}

img{
width:100%;
max-width:900px;
border-radius:10px;
}

h2{
margin:15px 0;
color:#333;
}

button{
margin-top:15px;
padding:12px 30px;
background:#0056b3;
color:#fff;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#003f80;
}

footer{
margin-top:30px;
padding:20px;
background:#fff;
color:#555;
}
</style>

</head>

<body>

<header>
Certificate Gallery
</header>

<div class="container">

<div class="card">
<h2>Certificate 1</h2>
<img src="PAK6fqCD.jpg" alt="Certificate 1">
</div>

<div class="card">
<h2>Certificate 2</h2>
<img src="1633265936658.jpeg" alt="Certificate 2">
</div>

<button onclick="window.scrollTo({top:0,behavior:'smooth'})">
Back to Top
</button>

</div>

<footer>
© 2026 Certificate Gallery
</footer>

</body>
</html>
